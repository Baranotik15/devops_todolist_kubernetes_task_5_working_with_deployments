apiVersion: apps/v1
kind: Deployment

metadata:
  name: todoapp
  namespace: mateapp
  labels:
    app: todoapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todoapp

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: todoapp
  
    spec:
      containers:
      - name: todoapp
        image: ikulyk404/todoapp:3.0.0
        env:
        - name: PYTHONUNBUFFERED
          value: "1"

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: api/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5




